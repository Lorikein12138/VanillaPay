{extend name="merchant_layout"}
{block name="title"}订单{/block}
{block name="content"}
<h1 class="mb-4 text-2xl font-semibold">订单</h1>
<form class="mb-3 flex gap-2 text-sm"><select name="status" class="rounded-md border border-zinc-300 px-3 py-2"><option value="">全部</option><option value="pending">待支付</option><option value="paid">已支付</option><option value="expired">已过期</option></select><button class="rounded-md bg-zinc-800 px-4 py-2 text-white">筛选</button></form>
<table class="w-full overflow-hidden rounded-lg border border-zinc-200 bg-white text-sm">
  <thead class="bg-zinc-100 text-left"><tr><th class="p-3">订单号</th><th>商户单号</th><th>渠道</th><th>金额</th><th>实付</th><th>状态</th><th>时间</th></tr></thead>
  <tbody>{volist name="data.items" id="o"}<tr class="border-t border-zinc-200"><td class="p-3 font-mono">{$o.order_no}</td><td>{$o.out_trade_no}</td><td>{$o.channel}</td><td>{$o.money}</td><td>{$o.real_amount}</td><td>{$o.status}</td><td>{$o.create_time}</td></tr>{/volist}</tbody>
</table>
<div class="mt-3 text-sm text-zinc-500">共 {$data.total} 条</div>
{/block}
