{extend name="merchant_layout"}
{block name="title"}订单{/block}
{block name="content"}
<div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
  <div>
    <p class="text-sm font-medium text-teal-700">Orders</p>
    <h1 class="mt-1 text-2xl font-semibold text-zinc-950">订单</h1>
  </div>
  <a href="/order-test" class="w-fit rounded-md bg-zinc-950 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-zinc-800">订单测试</a>
</div>

<form class="mb-4 flex flex-col gap-2 rounded-lg border border-zinc-200 bg-white p-3 text-sm shadow-sm sm:flex-row sm:items-center">
  <select name="status" class="h-10 rounded-md border border-zinc-300 px-3 outline-none transition focus:border-teal-500 focus:ring-2 focus:ring-teal-100">
    <option value="">全部</option>
    <option value="pending">待支付</option>
    <option value="paid">已支付</option>
    <option value="expired">已过期</option>
  </select>
  <button class="rounded-md bg-zinc-900 px-4 py-2 font-semibold text-white transition hover:bg-zinc-800">筛选</button>
</form>

<div class="overflow-hidden rounded-lg border border-zinc-200 bg-white shadow-sm">
  <div class="overflow-x-auto">
    <table class="w-full min-w-[900px] text-sm">
      <thead class="bg-zinc-100 text-left text-xs text-zinc-500">
        <tr><th class="px-3 py-3">订单号</th><th class="px-3 py-3">商户单号</th><th class="px-3 py-3">渠道</th><th class="px-3 py-3">金额</th><th class="px-3 py-3">实付</th><th class="px-3 py-3">状态</th><th class="px-3 py-3">时间</th></tr>
      </thead>
      <tbody class="divide-y divide-zinc-200">
        {volist name="data.items" id="o"}
        <tr class="transition hover:bg-zinc-50">
          <td class="px-3 py-3 font-mono text-xs text-zinc-900">{$o.order_no}</td>
          <td class="px-3 py-3 font-mono text-xs text-zinc-700">{$o.out_trade_no}</td>
          <td class="px-3 py-3">{$o.channel}</td>
          <td class="px-3 py-3">{$o.money}</td>
          <td class="px-3 py-3 font-semibold text-zinc-950">{$o.real_amount}</td>
          <td class="px-3 py-3"><span class="rounded-md bg-zinc-100 px-2 py-1 text-xs text-zinc-700">{$o.status}</span></td>
          <td class="px-3 py-3 text-zinc-500">{$o.create_time}</td>
        </tr>
        {/volist}
      </tbody>
    </table>
  </div>
</div>
<div class="mt-3 text-sm text-zinc-500">共 {$data.total} 条</div>
{/block}
