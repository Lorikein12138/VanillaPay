{extend name="layout"}
{block name="title"}重置密码 - VanillaPay{/block}
{block name="body"}
<main class="flex min-h-screen items-center justify-center px-4 py-8">
  <section class="w-full max-w-md rounded-lg border border-zinc-200 bg-white p-6 shadow-soft sm:p-8">
    <div class="mb-6">
      <a href="/login" class="text-sm font-semibold text-zinc-950">VanillaPay</a>
      <h1 class="mt-4 text-2xl font-semibold text-zinc-950">重置密码</h1>
    </div>
    {if condition="$Think.session.flash"}
      <div class="mb-4 rounded-md border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-800">{$Think.session.flash}</div>
    {/if}
    <form method="post" action="/reset" class="space-y-4">
      <input type="hidden" name="token" value="{$token}">
      <label class="block">
        <span class="text-sm font-medium text-zinc-700">新密码</span>
        <input name="password" type="password" autocomplete="new-password" class="mt-1 h-11 w-full rounded-md border border-zinc-300 bg-white px-3 text-sm outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-100">
      </label>
      <button class="flex h-11 w-full items-center justify-center rounded-md bg-zinc-950 px-4 text-sm font-semibold text-white transition hover:bg-zinc-800">保存新密码</button>
    </form>
  </section>
</main>
{/block}
