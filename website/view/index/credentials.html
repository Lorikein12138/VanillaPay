{extend name="merchant_layout"}
{block name="title"}商户凭证{/block}
{block name="content"}
<div class="mb-6">
  <p class="text-sm font-medium text-teal-700">Credentials</p>
  <h1 class="mt-1 text-2xl font-semibold text-zinc-950">商户凭证</h1>
</div>
<div class="grid gap-4 lg:grid-cols-2">
  <div class="rounded-lg border border-zinc-200 bg-white p-5 shadow-sm transition hover:shadow-soft">
    <div class="text-sm text-zinc-500">PID</div>
    <div class="mt-3 break-all rounded-md bg-zinc-50 p-3 font-mono text-lg text-zinc-950">{$user.pid}</div>
  </div>
  <div class="rounded-lg border border-zinc-200 bg-white p-5 shadow-sm transition hover:shadow-soft">
    <div class="text-sm text-zinc-500">API KEY</div>
    <div class="mt-3 break-all rounded-md bg-zinc-50 p-3 font-mono text-sm leading-6 text-zinc-950">{$user.api_key}</div>
  </div>
</div>
{/block}
