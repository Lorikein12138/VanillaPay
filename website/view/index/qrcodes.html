{extend name="merchant_layout"}
{block name="title"}收款码{/block}
{block name="content"}
<h1 class="mb-4 text-2xl font-semibold">收款码</h1>
<form method="post" action="/qrcodes/upload" enctype="multipart/form-data" class="mb-5 grid gap-3 rounded-lg border border-zinc-200 bg-white p-4 md:grid-cols-[160px_1fr_auto]">
  <input type="hidden" name="_csrf" value="{:csrf_token()}">
  <select name="channel" class="rounded-md border border-zinc-300 px-3 py-2 text-sm"><option value="wxpay">微信</option><option value="alipay">支付宝</option></select>
  <input name="qrcode" type="file" accept="image/png,image/jpeg,image/webp,image/gif" class="rounded-md border border-zinc-300 px-3 py-2 text-sm">
  <button class="rounded-md bg-zinc-950 px-4 py-2 text-sm font-semibold text-white">上传或替换</button>
</form>
<p class="mb-4 text-sm text-zinc-500">每个商户最多保留 2 张收款码：微信、支付宝各 1 张。图片会自动裁剪外部边框并清理中心头像区域。</p>
<div class="grid gap-4 md:grid-cols-2">
  {volist name="list" id="q" empty="<div class='rounded-lg border border-dashed border-zinc-300 bg-white p-6 text-center text-sm text-zinc-500 md:col-span-2'>还没有收款码，请上传微信或支付宝收款码。</div>"}
  <article class="rounded-lg border border-zinc-200 bg-white p-4">
    <img src="{$q.qr_image_path}" class="h-48 w-full object-contain" alt="收款码">
    <div class="mt-3 flex items-center justify-between text-sm"><span>{eq name="q.channel" value="wxpay"}微信{else/}支付宝{/eq} / {$q.name}</span><span class="text-zinc-500">#{$q.id}</span></div>
    <form method="post" action="/qrcodes/delete" class="mt-3"><input type="hidden" name="_csrf" value="{:csrf_token()}"><input type="hidden" name="id" value="{$q.id}"><button class="text-sm text-rose-700">删除</button></form>
  </article>
  {/volist}
</div>
{/block}
