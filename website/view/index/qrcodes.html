{extend name="merchant_layout"}
{block name="title"}收款码{/block}
{block name="content"}
<h1 class="mb-4 text-2xl font-semibold">收款码</h1>
<form method="post" action="/qrcodes/upload" enctype="multipart/form-data" class="mb-5 grid gap-3 rounded-lg border border-zinc-200 bg-white p-4 md:grid-cols-[140px_1fr_1fr_auto]">
  <input type="hidden" name="_csrf" value="{:csrf_token()}">
  <select name="channel" class="rounded-md border border-zinc-300 px-3 py-2 text-sm"><option value="wxpay">微信</option><option value="alipay">支付宝</option></select>
  <input name="name" placeholder="名称" class="rounded-md border border-zinc-300 px-3 py-2 text-sm">
  <input name="qrcode" type="file" accept="image/png,image/jpeg,image/webp,image/gif" class="rounded-md border border-zinc-300 px-3 py-2 text-sm">
  <button class="rounded-md bg-zinc-950 px-4 py-2 text-sm font-semibold text-white">上传</button>
</form>
<div class="grid gap-4 md:grid-cols-3">
  {volist name="list" id="q"}
  <article class="rounded-lg border border-zinc-200 bg-white p-4">
    <img src="{$q.qr_image_path}" class="h-48 w-full object-contain" alt="收款码">
    <div class="mt-3 flex items-center justify-between text-sm"><span>{$q.channel} / {$q.name}</span><span class="text-zinc-500">#{$q.id}</span></div>
    <form method="post" action="/qrcodes/delete" class="mt-3"><input type="hidden" name="_csrf" value="{:csrf_token()}"><input type="hidden" name="id" value="{$q.id}"><button class="text-sm text-rose-700">删除</button></form>
  </article>
  {/volist}
</div>
{/block}
