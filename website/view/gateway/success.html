<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>支付成功 - VanillaPay</title>
  <link rel="stylesheet" href="/static/dist/app.css?v={:asset_version('/static/dist/app.css')}">
</head>
{eq name="theme.code" value="wxpay"}
<body class="min-h-screen bg-emerald-50 px-4 py-8 text-zinc-900">
{else/}
<body class="min-h-screen bg-sky-50 px-4 py-8 text-zinc-900">
{/eq}
  <main class="mx-auto flex min-h-[calc(100vh-4rem)] max-w-md items-center">
    <section class="w-full overflow-hidden rounded-2xl border border-white/80 bg-white shadow-soft">
      {eq name="theme.code" value="wxpay"}
      <div class="bg-gradient-to-br from-emerald-500 to-teal-600 px-6 py-8 text-center text-white">
        <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-white/15 text-3xl font-semibold ring-1 ring-white/25">✓</div>
      {else/}
      <div class="bg-gradient-to-br from-sky-500 to-blue-600 px-6 py-8 text-center text-white">
        <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-white/15 text-3xl font-semibold ring-1 ring-white/25">✓</div>
      {/eq}
        <h1 class="mt-4 text-2xl font-semibold">支付成功</h1>
        <p class="mt-2 text-sm text-white/80">订单已完成，正在返回对应页面。</p>
      </div>

      <div class="p-5">
        <section class="rounded-xl border border-zinc-200 bg-white p-4 text-sm shadow-sm">
          <div class="flex items-center justify-between gap-3 border-b border-zinc-100 py-2">
            <span class="text-zinc-500">商品名</span>
            <span class="max-w-[220px] truncate font-medium text-zinc-900">{$order.product_name}</span>
          </div>
          <div class="flex items-center justify-between gap-3 border-b border-zinc-100 py-2">
            <span class="text-zinc-500">付款渠道</span>
            <span class="font-medium text-zinc-900">{$channelName}</span>
          </div>
          <div class="flex items-center justify-between gap-3 border-b border-zinc-100 py-2">
            <span class="text-zinc-500">付款金额</span>
            <span class="font-mono text-lg font-semibold text-zinc-950">￥{$order.real_amount}</span>
          </div>
          <div class="flex items-center justify-between gap-3 py-2">
            <span class="text-zinc-500">付款时间</span>
            <span class="font-medium text-zinc-900">{$paidAt}</span>
          </div>
        </section>

        <div class="mt-4 rounded-xl bg-zinc-50 p-4 text-center text-sm text-zinc-500 ring-1 ring-zinc-100" aria-label="5 秒后自动跳转">
          <span id="redirect-countdown" data-return-url="{$returnUrl}" data-countdown="5">5</span> 秒后自动跳转
        </div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var el = document.getElementById('redirect-countdown');
      if (!el) return;
      var remaining = parseInt(el.dataset.countdown || '5', 10);
      var returnUrl = el.dataset.returnUrl || '/';
      function render() {
        el.textContent = String(Math.max(0, remaining));
        if (remaining <= 0) {
          window.location.href = returnUrl;
          return;
        }
        remaining -= 1;
        setTimeout(render, 1000);
      }
      render();
    })();
  </script>
</body>
</html>
