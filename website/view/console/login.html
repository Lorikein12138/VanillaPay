<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Console 登录 - VanillaPay</title>
  <link rel="stylesheet" href="/static/dist/app.css?v={:asset_version('/static/dist/app.css')}">
</head>
<body class="flex min-h-screen items-center justify-center bg-zinc-100 px-4">
  <form method="post" action="/console/login" class="w-full max-w-sm rounded-lg border border-zinc-200 bg-white p-6 shadow-sm">
    <input type="hidden" name="_csrf" value="{:csrf_token()}">
    <h1 class="mb-5 text-xl font-semibold">控制台登录</h1>
    {if condition="$Think.session.flash"}<div class="mb-4 rounded-md bg-rose-50 px-3 py-2 text-sm text-rose-700">{$Think.session.flash}</div>{/if}
    <label class="block text-sm">账号<input name="username" class="mt-1 h-10 w-full rounded-md border border-zinc-300 px-3"></label>
    <label class="mt-3 block text-sm">密码<input name="password" type="password" class="mt-1 h-10 w-full rounded-md border border-zinc-300 px-3"></label>
    <button class="mt-5 h-10 w-full rounded-md bg-zinc-950 text-sm font-semibold text-white">登录</button>
  </form>
</body>
</html>
