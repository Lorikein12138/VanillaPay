{extend name="layout"}
{block name="title"}设备信息{/block}
{block name="content"}
<div class="mb-5">
  <p class="text-sm font-medium text-teal-700">Devices</p>
  <h1 class="mt-1 text-2xl font-semibold text-zinc-950">设备信息</h1>
</div>

<div class="overflow-hidden rounded-lg border border-zinc-200 bg-white shadow-sm">
  <table class="w-full text-left text-sm">
    <thead class="bg-zinc-50 text-xs font-semibold uppercase text-zinc-500">
      <tr>
        <th class="px-4 py-3">ID</th>
        <th class="px-4 py-3">商户</th>
        <th class="px-4 py-3">状态</th>
        <th class="px-4 py-3">最后心跳</th>
        <th class="px-4 py-3">IP</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-zinc-100">
      {volist name="list" id="d"}
      <tr class="align-middle transition hover:bg-zinc-50/80">
        <td class="px-4 py-4 align-middle font-mono text-zinc-700">{$d.id}</td>
        <td class="px-4 py-4 align-middle">{$d.user_id}</td>
        <td class="px-4 py-4 align-middle">{$d.status}</td>
        <td class="px-4 py-4 align-middle whitespace-nowrap text-zinc-600">{$d.last_heartbeat|default='-'}</td>
        <td class="px-4 py-4 align-middle font-mono text-xs text-zinc-600">{$d.last_ip|default='-'}</td>
      </tr>
      {/volist}
    </tbody>
  </table>
</div>
{/block}
