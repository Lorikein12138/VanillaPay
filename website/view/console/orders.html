{extend name="layout"}
{block name="title"}订单{/block}
{block name="content"}
<h1 class="mb-4 text-2xl font-semibold">全局订单</h1>
<table class="w-full overflow-hidden rounded-lg border border-zinc-200 bg-white text-sm">
  <thead class="bg-zinc-100 text-left"><tr><th class="p-3">订单号</th><th>商户</th><th>协议</th><th>实付</th><th>状态</th><th>通知</th><th>时间</th></tr></thead>
  <tbody>{volist name="data.items" id="o"}<tr class="border-t border-zinc-200"><td class="p-3 font-mono">{$o.order_no}</td><td>{$o.user_id}</td><td>{$o.protocol}</td><td>{$o.real_amount}</td><td>{$o.status}</td><td>{$o.notify_status}</td><td>{$o.create_time}</td></tr>{/volist}</tbody>
</table>
<div class="mt-3 text-sm text-zinc-500">共 {$data.total} 条</div>
{/block}
