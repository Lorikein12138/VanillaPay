{extend name="layout"}
{block name="title"}设置{/block}
{block name="content"}
<h1 class="mb-4 text-2xl font-semibold">系统设置</h1>
<form method="post" action="/console/settings/save" class="max-w-md space-y-3 rounded-lg border border-zinc-200 bg-white p-4 text-sm">
  <input type="hidden" name="_csrf" value="{:csrf_token()}">
  <label class="block"><input type="checkbox" name="register_audit" value="1" {if condition="isset($s['register_audit']) && $s['register_audit']=='1'"}checked{/if}> 注册需人工审核</label>
  <label class="block">回调驱动<select name="callback_driver" class="mt-1 w-full rounded-md border border-zinc-300 px-3 py-2"><option value="sync">同步</option><option value="queue">队列</option></select></label>
  <label class="block">系统公告<textarea name="notice" class="mt-1 w-full rounded-md border border-zinc-300 px-3 py-2">{$s.notice|default=''}</textarea></label>
  <button class="rounded-md bg-zinc-950 px-4 py-2 font-semibold text-white">保存</button>
</form>
{/block}
