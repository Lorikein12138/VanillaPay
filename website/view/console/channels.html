{extend name="layout"}
{block name="title"}支付管理{/block}
{block name="content"}
<div class="mb-5">
  <p class="text-sm font-medium text-teal-700">Payments</p>
  <h1 class="mt-1 text-2xl font-semibold text-zinc-950">支付管理</h1>
</div>

<form method="post" action="/console/channels/save" class="max-w-lg rounded-lg border border-zinc-200 bg-white p-5 text-sm shadow-sm">
  <input type="hidden" name="_csrf" value="{:csrf_token()}">

  <section>
    <h2 class="font-semibold text-zinc-950">收款渠道</h2>
    <div class="mt-3 grid gap-2 sm:grid-cols-2">
      {volist name="channels" id="c"}
      <label class="flex items-center justify-between rounded-md border border-zinc-200 bg-zinc-50 px-3 py-2">
        <span>{$c.name}</span>
        <input type="checkbox" name="{$c.code}" value="1" {eq name="c.enabled" value="1"}checked{/eq}>
      </label>
      {/volist}
    </div>
  </section>

  <section class="mt-5">
    <h2 class="font-semibold text-zinc-950">支付协议</h2>
    <div class="mt-3 grid gap-2">
      <label class="flex items-center justify-between rounded-md border border-zinc-200 bg-zinc-50 px-3 py-2"><span>易支付</span><input type="checkbox" name="epay" value="1" {eq name="protocols.epay" value="1"}checked{/eq}></label>
      <label class="flex items-center justify-between rounded-md border border-zinc-200 bg-zinc-50 px-3 py-2"><span>码支付</span><input type="checkbox" name="codepay" value="1" {eq name="protocols.codepay" value="1"}checked{/eq}></label>
      <label class="flex items-center justify-between rounded-md border border-zinc-200 bg-zinc-50 px-3 py-2"><span>源支付</span><input type="checkbox" name="yuanpay" value="1" {eq name="protocols.yuanpay" value="1"}checked{/eq}></label>
    </div>
  </section>

  <button class="mt-5 rounded-md bg-zinc-950 px-4 py-2 font-semibold text-white shadow-sm transition hover:bg-zinc-800">保存</button>
</form>
{/block}
