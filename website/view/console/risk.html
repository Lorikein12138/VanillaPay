{extend name="layout"}
{block name="title"}风控{/block}
{block name="content"}
<h1 class="mb-4 text-2xl font-semibold">风控中心</h1>
<table class="w-full overflow-hidden rounded-lg border border-zinc-200 bg-white text-sm">
  <thead class="bg-zinc-100 text-left"><tr><th class="p-3">类型</th><th>商户</th><th>设备</th><th>级别</th><th>详情</th><th>时间</th><th>操作</th></tr></thead>
  <tbody>{volist name="data.items" id="r"}<tr class="border-t border-zinc-200"><td class="p-3">{$r.type}</td><td>{$r.user_id}</td><td>{$r.device_id}</td><td>{$r.level}</td><td class="max-w-md truncate">{$r.detail}</td><td>{$r.create_time}</td><td>{eq name="r.handled" value="0"}<form method="post" action="/console/risk/handle"><input type="hidden" name="_csrf" value="{:csrf_token()}"><input type="hidden" name="id" value="{$r.id}"><button class="text-teal-700">处理</button></form>{else/}已处理{/eq}</td></tr>{/volist}</tbody>
</table>
{/block}
