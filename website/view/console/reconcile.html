{extend name="layout"}
{block name="title"}对账{/block}
{block name="content"}
<h1 class="mb-4 text-2xl font-semibold">对账</h1>
<form class="mb-4 text-sm"><input type="date" name="date" value="{$date}" class="rounded-md border border-zinc-300 px-3 py-2"><button class="ml-2 rounded-md bg-zinc-800 px-4 py-2 text-white">查询</button></form>
<div class="grid gap-4 md:grid-cols-5">
  <div class="rounded-lg border border-zinc-200 bg-white p-4"><div class="text-sm text-zinc-500">成功笔数</div><div class="mt-2 text-2xl font-semibold">{$r.paid_count}</div></div>
  <div class="rounded-lg border border-zinc-200 bg-white p-4"><div class="text-sm text-zinc-500">成功金额</div><div class="mt-2 text-2xl font-semibold">￥{$r.paid_amount}</div></div>
  <div class="rounded-lg border border-zinc-200 bg-white p-4"><div class="text-sm text-zinc-500">过期笔数</div><div class="mt-2 text-2xl font-semibold">{$r.expired_count}</div></div>
  <div class="rounded-lg border border-zinc-200 bg-white p-4"><div class="text-sm text-zinc-500">回调失败</div><div class="mt-2 text-2xl font-semibold text-rose-700">{$r.notify_fail}</div></div>
  <div class="rounded-lg border border-zinc-200 bg-white p-4"><div class="text-sm text-zinc-500">无主到账</div><div class="mt-2 text-2xl font-semibold text-amber-700">{$r.unmatched_count}</div></div>
</div>
{/block}
